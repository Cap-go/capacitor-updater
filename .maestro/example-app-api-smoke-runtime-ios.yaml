appId: app.capgo.updater
---
- stopApp
- launchApp
- extendedWaitUntil:
    visible: '@capgo/capacitor-updater'
    timeout: 180000
- assertVisible: '@capgo/capacitor-updater'
- extendedWaitUntil:
    visible: '.*Harness: ready.*'
    timeout: 120000
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- scrollUntilVisible:
    element:
      id: 'quick-action-set-app-id'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
    waitToSettleTimeoutMs: 500
- tapOn:
    id: 'quick-action-set-app-id'
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 500
- extendedWaitUntil:
    visible: '.*(Marker: set-app-id:success|M:set-app-id:success).*'
    timeout: 90000
- scrollUntilVisible:
    element:
      id: 'quick-action-set-custom-id'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
    waitToSettleTimeoutMs: 500
- tapOn:
    id: 'quick-action-set-custom-id'
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 500
- extendedWaitUntil:
    visible: '.*(Marker: set-custom-id:success|M:set-custom-id:success).*'
    timeout: 90000
- scrollUntilVisible:
    element:
      id: 'quick-action-set-runtime-urls'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
    waitToSettleTimeoutMs: 500
- tapOn:
    id: 'quick-action-set-runtime-urls'
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 500
- extendedWaitUntil:
    visible: '.*(Marker: set-runtime-urls:success|M:set-runtime-urls:success).*'
    timeout: 90000
- scrollUntilVisible:
    element:
      id: 'quick-action-set-channel-beta'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
    waitToSettleTimeoutMs: 500
- tapOn:
    id: 'quick-action-set-channel-beta'
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 500
- extendedWaitUntil:
    visible: '.*(Marker: set-channel-beta:success|M:set-channel-beta:success).*'
    timeout: 90000
- scrollUntilVisible:
    element:
      id: 'quick-action-unset-channel'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
    waitToSettleTimeoutMs: 500
- tapOn:
    id: 'quick-action-unset-channel'
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 500
- extendedWaitUntil:
    visible: '.*(Marker: unset-channel:success|M:unset-channel:success).*'
    timeout: 90000
- scrollUntilVisible:
    element:
      id: 'quick-action-queue-boot-verify-persisted-config'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
    waitToSettleTimeoutMs: 500
- tapOn:
    id: 'quick-action-queue-boot-verify-persisted-config'
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 500
- extendedWaitUntil:
    visible: '.*(Marker: boot-persisted:success|M:boot-persisted:success).*'
    timeout: 90000
- runFlow: helpers/cold-launch-app.yaml
- extendedWaitUntil:
    visible: '@capgo/capacitor-updater'
    timeout: 120000
- extendedWaitUntil:
    visible: '.*Harness: ready.*'
    timeout: 120000
- extendedWaitUntil:
    visible: '.*(Marker: persisted:success|M:persisted:success).*'
    timeout: 180000
