appId: app.capgo.updater
---
- extendedWaitUntil:
    visible: '@capgo/capacitor-updater'
    timeout: 180000
- assertVisible: '@capgo/capacitor-updater'
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- scrollUntilVisible:
    element:
      id: 'quick-action-reset-server-release'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
    waitToSettleTimeoutMs: 500
- tapOn:
    id: 'quick-action-reset-server-release'
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      text: '.*Marker: reset:success.*'
    direction: UP
    timeout: 30000
    visibilityPercentage: 1
- scrollUntilVisible:
    element:
      id: 'quick-action-download-latest-bundle'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
    waitToSettleTimeoutMs: 500
- tapOn:
    id: 'quick-action-download-latest-bundle'
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      text: '.*Marker: download:success.*'
    direction: UP
    timeout: 120000
    visibilityPercentage: 1
- scrollUntilVisible:
    element:
      id: 'quick-action-set-bundle-error'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
    waitToSettleTimeoutMs: 500
- tapOn:
    id: 'quick-action-set-bundle-error'
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      text: '.*Marker: bundle:(success|expected-rejection).*'
    direction: UP
    timeout: 30000
    visibilityPercentage: 1
