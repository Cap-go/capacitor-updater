appId: app.capgo.updater
---
- extendedWaitUntil:
    visible: '@capgo/capacitor-updater'
    timeout: 180000
- assertVisible: '@capgo/capacitor-updater'
- extendedWaitUntil:
    visible: '.*Harness: ready.*'
    timeout: 120000
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- scrollUntilVisible:
    element:
      id: 'quick-action-set-runtime-urls'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
    waitToSettleTimeoutMs: 500
- tapOn:
    id: 'quick-action-set-runtime-urls'
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible: '.*(Marker: set-runtime-urls:success|M:set-runtime-urls:success).*'
    timeout: 30000
- scrollUntilVisible:
    element:
      id: 'quick-action-reset-server-release'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
    waitToSettleTimeoutMs: 500
- tapOn:
    id: 'quick-action-reset-server-release'
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible: '.*(Marker: reset:success|M:reset:success).*'
    timeout: 30000
- scrollUntilVisible:
    element:
      id: 'quick-action-download-latest-bundle-observe-store'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
    waitToSettleTimeoutMs: 500
- tapOn:
    id: 'quick-action-download-latest-bundle-observe-store'
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible: '.*(Marker: download-store:success|M:download-store:success).*'
    timeout: 120000
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- scrollUntilVisible:
    element:
      id: 'quick-action-queue-last-downloaded-bundle'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn:
    id: 'quick-action-queue-last-downloaded-bundle'
- extendedWaitUntil:
    visible: '.*(Marker: queue:success|M:queue:success).*'
    timeout: 30000
- extendedWaitUntil:
    visible: '.*Set next event: manual-manifest-v1.*'
    timeout: 30000
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- scrollUntilVisible:
    element:
      id: 'quick-action-reload-app'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn:
    id: 'quick-action-reload-app'
- extendedWaitUntil:
    visible: '@capgo/capacitor-updater'
    timeout: 180000
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- assertVisible: '.*Current bundle source: downloaded.*'
- assertVisible: '.*Current bundle version: manual-manifest-v1.*'
- scrollUntilVisible:
    element:
      id: 'quick-action-advance-server-release'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn:
    id: 'quick-action-advance-server-release'
- extendedWaitUntil:
    visible: '.*(Marker: advance:success|M:advance:success).*'
    timeout: 30000
- scrollUntilVisible:
    element:
      id: 'quick-action-download-latest-bundle-observe-store'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn:
    id: 'quick-action-download-latest-bundle-observe-store'
- extendedWaitUntil:
    visible: '.*(Marker: download-store:success|M:download-store:success).*'
    timeout: 120000
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- scrollUntilVisible:
    element:
      id: 'quick-action-queue-last-downloaded-bundle'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn:
    id: 'quick-action-queue-last-downloaded-bundle'
- extendedWaitUntil:
    visible: '.*(Marker: queue:success|M:queue:success).*'
    timeout: 30000
- extendedWaitUntil:
    visible: '.*Set next event: manual-manifest-v2.*'
    timeout: 30000
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- scrollUntilVisible:
    element:
      id: 'quick-action-reload-app'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn:
    id: 'quick-action-reload-app'
- extendedWaitUntil:
    visible: '@capgo/capacitor-updater'
    timeout: 180000
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- assertVisible: '.*Current bundle source: downloaded.*'
- assertVisible: '.*Current bundle version: manual-manifest-v2.*'
- scrollUntilVisible:
    element:
      id: 'quick-action-get-next-bundle'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- scrollUntilVisible:
    element:
      id: 'quick-action-get-latest-no-update'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn:
    id: 'quick-action-get-latest-no-update'
- extendedWaitUntil:
    visible: '.*(Marker: no-update:success|M:no-update:success).*'
    timeout: 60000
