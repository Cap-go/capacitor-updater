appId: app.capgo.updater
---
- extendedWaitUntil:
    visible: '@capgo/capacitor-updater'
    timeout: 180000
- assertVisible: '@capgo/capacitor-updater'
- extendedWaitUntil:
    visible: '.*Harness: ready.*'
    timeout: 120000
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- scrollUntilVisible:
    element:
      id: 'quick-action-set-runtime-urls'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
    waitToSettleTimeoutMs: 500
- tapOn:
    id: 'quick-action-set-runtime-urls'
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      text: '.*Marker: set-runtime-urls:success.*'
    direction: UP
    timeout: 30000
    visibilityPercentage: 1
- scrollUntilVisible:
    element:
      id: 'quick-action-reset-server-release'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
    waitToSettleTimeoutMs: 500
- tapOn:
    id: 'quick-action-reset-server-release'
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      text: '.*Marker: reset:success.*'
    direction: UP
    timeout: 30000
    visibilityPercentage: 1
- scrollUntilVisible:
    element:
      id: 'quick-action-download-latest-bundle'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
    waitToSettleTimeoutMs: 500
- tapOn:
    id: 'quick-action-download-latest-bundle'
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      text: '.*Marker: download:success.*'
    direction: UP
    timeout: 120000
    visibilityPercentage: 1
- extendedWaitUntil:
    visible: '.*Download event: .*manual-manifest-v1.*'
    timeout: 30000
- extendedWaitUntil:
    visible: '.*Download complete event: manual-manifest-v1.*'
    timeout: 30000
- extendedWaitUntil:
    visible: '.*Update available event: manual-manifest-v1.*'
    timeout: 30000
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- scrollUntilVisible:
    element:
      id: 'quick-action-queue-last-downloaded-bundle'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn:
    id: 'quick-action-queue-last-downloaded-bundle'
- scrollUntilVisible:
    element:
      text: '.*Marker: queue:success.*'
    direction: UP
    timeout: 30000
    visibilityPercentage: 1
- extendedWaitUntil:
    visible: '.*Set next event: manual-manifest-v1.*'
    timeout: 30000
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- scrollUntilVisible:
    element:
      id: 'quick-action-reload-app'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn:
    id: 'quick-action-reload-app'
- extendedWaitUntil:
    visible: '@capgo/capacitor-updater'
    timeout: 180000
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- assertVisible: '.*Current bundle source: downloaded.*'
- assertVisible: '.*Current bundle version: manual-manifest-v1.*'
- scrollUntilVisible:
    element:
      id: 'quick-action-advance-server-release'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn:
    id: 'quick-action-advance-server-release'
- scrollUntilVisible:
    element:
      text: '.*Marker: advance:success.*'
    direction: UP
    timeout: 30000
    visibilityPercentage: 1
- scrollUntilVisible:
    element:
      id: 'quick-action-download-latest-bundle'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn:
    id: 'quick-action-download-latest-bundle'
- scrollUntilVisible:
    element:
      text: '.*Marker: download:success.*'
    direction: UP
    timeout: 120000
    visibilityPercentage: 1
- extendedWaitUntil:
    visible: '.*Download event: .*manual-manifest-v2.*'
    timeout: 30000
- extendedWaitUntil:
    visible: '.*Download complete event: manual-manifest-v2.*'
    timeout: 30000
- extendedWaitUntil:
    visible: '.*Update available event: manual-manifest-v2.*'
    timeout: 30000
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- scrollUntilVisible:
    element:
      id: 'quick-action-queue-last-downloaded-bundle'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn:
    id: 'quick-action-queue-last-downloaded-bundle'
- scrollUntilVisible:
    element:
      text: '.*Marker: queue:success.*'
    direction: UP
    timeout: 30000
    visibilityPercentage: 1
- extendedWaitUntil:
    visible: '.*Set next event: manual-manifest-v2.*'
    timeout: 30000
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- scrollUntilVisible:
    element:
      id: 'quick-action-reload-app'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn:
    id: 'quick-action-reload-app'
- extendedWaitUntil:
    visible: '@capgo/capacitor-updater'
    timeout: 180000
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- assertVisible: '.*Current bundle source: downloaded.*'
- assertVisible: '.*Current bundle version: manual-manifest-v2.*'
- scrollUntilVisible:
    element:
      id: 'quick-action-get-next-bundle'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- scrollUntilVisible:
    element:
      id: 'quick-action-get-latest-no-update'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn:
    id: 'quick-action-get-latest-no-update'
- scrollUntilVisible:
    element:
      text: '.*Marker: no-update:success.*'
    direction: UP
    timeout: 60000
    visibilityPercentage: 1
