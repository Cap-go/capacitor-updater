appId: app.capgo.updater
---
- extendedWaitUntil:
    visible: "Build label: ${SOURCE_LABEL}"
    timeout: 15000
- pressKey: Home
- launchApp
- extendedWaitUntil:
    visible: "Build label: ${SOURCE_LABEL}"
    timeout: 20000
- extendedWaitUntil:
    visible: "Next bundle version: ${PENDING_RELEASE}"
    timeout: 30000
- assertVisible: "Last completed download: ${PENDING_RELEASE}"
- pressKey: Home
- launchApp
- extendedWaitUntil:
    visible: "Build label: ${FINAL_LABEL}"
    timeout: 30000
- assertVisible: "Current bundle version: ${FINAL_RELEASE}"
- extendedWaitUntil:
    visible: "Notify app ready: ok.*"
    timeout: 15000
