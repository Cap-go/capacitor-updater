appId: app.capgo.updater
---
- extendedWaitUntil:
    visible: '@capgo/capacitor-updater'
    timeout: 180000
- assertVisible: '@capgo/capacitor-updater'
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- scrollUntilVisible:
    element:
      text: 'Quick reset release'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
    waitToSettleTimeoutMs: 500
- tapOn:
    text: 'Quick reset release'
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible: '.*(Marker: reset:success|M:reset:success).*'
    timeout: 30000
- scrollUntilVisible:
    element:
      text: 'Quick download latest bundle'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
    waitToSettleTimeoutMs: 500
- tapOn:
    text: 'Quick download latest bundle'
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible: '.*(Marker: download:success|M:download:success).*'
    timeout: 120000
- extendedWaitUntil:
    visible: '.*Download event: .*manual-zip-config-guards-v1.*'
    timeout: 30000
- extendedWaitUntil:
    visible: '.*Download complete event: manual-zip-config-guards-v1.*'
    timeout: 30000
- extendedWaitUntil:
    visible: '.*Update available event: manual-zip-config-guards-v1.*'
    timeout: 30000
- runFlow: ../helpers/cold-launch-app.yaml
- extendedWaitUntil:
    visible: '@capgo/capacitor-updater'
    timeout: 180000
- extendedWaitUntil:
    visible: '.*Harness: ready.*'
    timeout: 120000
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- assertVisible: '.*Build label: manual-zip-config-guards-builtin.*'
- scrollUntilVisible:
    element:
      text: 'Quick mark bundle error'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
    waitToSettleTimeoutMs: 500
- tapOn:
    text: 'Quick mark bundle error'
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible: '.*(Marker: bundle:expected-rejection|M:bundle:expected-rejection).*'
    timeout: 30000
