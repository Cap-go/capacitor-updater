appId: app.capgo.updater
---
- extendedWaitUntil:
    visible: '@capgo/capacitor-updater'
    timeout: 180000
- assertVisible: '@capgo/capacitor-updater'
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- scrollUntilVisible:
    element:
      text: 'Quick apply runtime URLs'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
    waitToSettleTimeoutMs: 500
- tapOn:
    text: 'Quick apply runtime URLs'
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible: '.*(Marker: set-runtime-urls:success|M:set-runtime-urls:success).*'
    timeout: 30000
- scrollUntilVisible:
    element:
      text: 'Quick reset release'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
    waitToSettleTimeoutMs: 500
- tapOn:
    text: 'Quick reset release'
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible: '.*(Marker: reset:success|M:reset:success).*'
    timeout: 30000
- scrollUntilVisible:
    element:
      text: 'Quick download latest bundle'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
    waitToSettleTimeoutMs: 500
- tapOn:
    text: 'Quick download latest bundle'
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible: '.*(Marker: download:success|M:download:success).*'
    timeout: 120000
- extendedWaitUntil:
    visible: '.*Download event: .*manual-manifest-v1.*'
    timeout: 30000
- extendedWaitUntil:
    visible: '.*Download complete event: manual-manifest-v1.*'
    timeout: 30000
- extendedWaitUntil:
    visible: '.*Update available event: manual-manifest-v1.*'
    timeout: 30000
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- scrollUntilVisible:
    element:
      text: 'Quick queue bundle'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn: 'Quick queue bundle'
- extendedWaitUntil:
    visible: '.*(Marker: queue:success|M:queue:success).*'
    timeout: 30000
- extendedWaitUntil:
    visible: '.*Set next event: manual-manifest-v1.*'
    timeout: 30000
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- scrollUntilVisible:
    element:
      text: 'Quick reload app'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn: 'Quick reload app'
- extendedWaitUntil:
    visible: '@capgo/capacitor-updater'
    timeout: 180000
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- assertVisible: '.*Current bundle source: downloaded.*'
- assertVisible: '.*Current bundle version: manual-manifest-v1.*'
- scrollUntilVisible:
    element:
      text: 'Quick advance release'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn: 'Quick advance release'
- extendedWaitUntil:
    visible: '.*(Marker: advance:success|M:advance:success).*'
    timeout: 30000
- scrollUntilVisible:
    element:
      text: 'Quick download latest bundle'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn: 'Quick download latest bundle'
- extendedWaitUntil:
    visible: '.*(Marker: download:success|M:download:success).*'
    timeout: 120000
- extendedWaitUntil:
    visible: '.*Download event: .*manual-manifest-v2.*'
    timeout: 30000
- extendedWaitUntil:
    visible: '.*Download complete event: manual-manifest-v2.*'
    timeout: 30000
- extendedWaitUntil:
    visible: '.*Update available event: manual-manifest-v2.*'
    timeout: 30000
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- scrollUntilVisible:
    element:
      text: 'Quick queue bundle'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn: 'Quick queue bundle'
- extendedWaitUntil:
    visible: '.*(Marker: queue:success|M:queue:success).*'
    timeout: 30000
- extendedWaitUntil:
    visible: '.*Set next event: manual-manifest-v2.*'
    timeout: 30000
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- scrollUntilVisible:
    element:
      text: 'Quick reload app'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn: 'Quick reload app'
- extendedWaitUntil:
    visible: '@capgo/capacitor-updater'
    timeout: 180000
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- assertVisible: '.*Current bundle source: downloaded.*'
- assertVisible: '.*Current bundle version: manual-manifest-v2.*'
- scrollUntilVisible:
    element:
      text: 'Quick read next bundle'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- scrollUntilVisible:
    element:
      text: 'Quick confirm no update'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn: 'Quick confirm no update'
- extendedWaitUntil:
    visible: '.*(Marker: no-update:success|M:no-update:success).*'
    timeout: 60000
