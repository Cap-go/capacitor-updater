appId: app.capgo.updater
---
- runFlow: ../helpers/cold-launch-app.yaml
- runFlow:
    file: assert-live-update-download.yaml
    env:
      BUILD_LABEL: '${BUILTIN_BUILD_LABEL}'
      SCENARIO_LINE: '${SCENARIO_LINE}'
      DIRECT_UPDATE_LINE: '${DIRECT_UPDATE_LINE}'
      AUTO_UPDATE_ENABLED_LINE: '${AUTO_UPDATE_ENABLED_LINE}'
      AUTO_UPDATE_AVAILABLE_LINE: '${AUTO_UPDATE_AVAILABLE_LINE}'
      NOTIFY_READY_LINE: '${BUILTIN_NOTIFY_READY_LINE}'
      CURRENT_SOURCE_LINE: '${BUILTIN_SOURCE_LINE}'
      CURRENT_VERSION_LINE: '${BUILTIN_VERSION_LINE}'
      NEXT_VERSION_LINE: '${FIRST_NEXT_VERSION_LINE}'
      LAST_DOWNLOAD_LINE: '${FIRST_LAST_DOWNLOAD_LINE}'
- runFlow: ../helpers/relaunch-app.yaml
- runFlow:
    file: assert-live-update-core.yaml
    env:
      BUILD_LABEL: '${FIRST_BUILD_LABEL}'
      SCENARIO_LINE: '${SCENARIO_LINE}'
      DIRECT_UPDATE_LINE: '${DIRECT_UPDATE_LINE}'
      AUTO_UPDATE_ENABLED_LINE: '${AUTO_UPDATE_ENABLED_LINE}'
      AUTO_UPDATE_AVAILABLE_LINE: '${AUTO_UPDATE_AVAILABLE_LINE}'
      NOTIFY_READY_LINE: '${FIRST_NOTIFY_READY_LINE}'
      CURRENT_SOURCE_LINE: '${DOWNLOADED_SOURCE_LINE}'
      CURRENT_VERSION_LINE: '${FIRST_CURRENT_VERSION_LINE}'
