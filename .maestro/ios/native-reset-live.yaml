appId: app.capgo.updater
---
- launchApp
- extendedWaitUntil:
    visible: 'CAPGO OTA VALIDATION'
    timeout: 180000
- scrollUntilVisible:
    element:
      text: 'Last completed download: native-reset-live'
    direction: DOWN
    timeout: 180000
- assertVisible: 'Last completed download: native-reset-live'
- pressKey: home
- launchApp
- extendedWaitUntil:
    visible: 'CAPGO OTA VALIDATION'
    timeout: 180000
- scrollUntilVisible:
    element:
      text: "${EXPECT_1}"
    direction: UP
    timeout: 180000
- assertVisible: "${EXPECT_1}"
- scrollUntilVisible:
    element:
      text: "${EXPECT_2}"
    direction: UP
    timeout: 180000
- assertVisible: "${EXPECT_2}"
- scrollUntilVisible:
    element:
      text: "${EXPECT_3}"
    direction: UP
    timeout: 180000
- assertVisible: "${EXPECT_3}"
- scrollUntilVisible:
    element:
      text: "${EXPECT_4}"
    direction: DOWN
    timeout: 180000
- assertVisible: "${EXPECT_4}"
- scrollUntilVisible:
    element:
      text: "${EXPECT_5}"
    direction: DOWN
    timeout: 180000
- assertVisible: "${EXPECT_5}"
