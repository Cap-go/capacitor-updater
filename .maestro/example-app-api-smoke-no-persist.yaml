appId: app.capgo.updater
---
- extendedWaitUntil:
    visible: '@capgo/capacitor-updater'
    timeout: 180000
- assertVisible: '@capgo/capacitor-updater'
- extendedWaitUntil:
    visible: '.*Harness: ready.*'
    timeout: 120000
- scrollUntilVisible:
    element:
      text: 'Apply app ID'
    direction: DOWN
    timeout: 120000
    centerElement: true
    visibilityPercentage: 1
    speed: 80
- tapOn:
    text: 'Apply app ID'
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      text: 'Action marker: set-app-id:success'
    direction: DOWN
    timeout: 120000
    visibilityPercentage: 1
- scrollUntilVisible:
    element:
      text: 'Apply custom ID'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
- tapOn:
    text: 'Apply custom ID'
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      text: 'Action marker: set-custom-id:success'
    direction: DOWN
    timeout: 120000
    visibilityPercentage: 1
- scrollUntilVisible:
    element:
      text: 'Apply update URL'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
- tapOn:
    text: 'Apply update URL'
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      text: 'Action marker: set-update-url:success'
    direction: DOWN
    timeout: 120000
    visibilityPercentage: 1
- scrollUntilVisible:
    element:
      text: 'Apply stats URL'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
- tapOn:
    text: 'Apply stats URL'
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      text: 'Action marker: set-stats-url:success'
    direction: DOWN
    timeout: 120000
    visibilityPercentage: 1
- scrollUntilVisible:
    element:
      text: 'Apply channel URL'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
- tapOn:
    text: 'Apply channel URL'
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      text: 'Action marker: set-channel-url:success'
    direction: DOWN
    timeout: 120000
    visibilityPercentage: 1
- scrollUntilVisible:
    element:
      text: 'Run listChannels()'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
- tapOn:
    text: 'Run listChannels()'
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      text: 'Set channel beta'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
- tapOn:
    text: 'Set channel beta'
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      text: 'Run getChannel()'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
- tapOn:
    text: 'Run getChannel()'
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      text: 'Set channel private-alpha'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
- tapOn:
    text: 'Set channel private-alpha'
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      text: 'Run unsetChannel()'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
- tapOn:
    text: 'Run unsetChannel()'
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      text: 'Run getLatest()'
    direction: DOWN
    timeout: 120000
    centerElement: true
    visibilityPercentage: 1
- tapOn:
    text: 'Run getLatest()'
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      text: 'Latest available version: manual-zip-no-persist-v1'
    direction: DOWN
    timeout: 120000
    visibilityPercentage: 1
- scrollUntilVisible:
    element:
      text: 'Last listChannels check: .*beta.*'
    direction: DOWN
    timeout: 120000
    visibilityPercentage: 1
- scrollUntilVisible:
    element:
      text: 'Last setChannel beta check: success'
    direction: DOWN
    timeout: 120000
    visibilityPercentage: 1
- scrollUntilVisible:
    element:
      text: 'Last getChannel check: beta'
    direction: DOWN
    timeout: 120000
    visibilityPercentage: 1
- scrollUntilVisible:
    element:
      text: 'Last private channel check: expected-rejection'
    direction: DOWN
    timeout: 120000
    visibilityPercentage: 1
- scrollUntilVisible:
    element:
      text: 'Last unsetChannel check: success'
    direction: DOWN
    timeout: 120000
    visibilityPercentage: 1
- runFlow: helpers/cold-launch-app.yaml
- extendedWaitUntil:
    visible: '@capgo/capacitor-updater'
    timeout: 120000
- extendedWaitUntil:
    visible: '.*Harness: ready.*'
    timeout: 120000
- scrollUntilVisible:
    element:
      text: 'Quick verify persisted config'
    direction: DOWN
    timeout: 30000
    centerElement: true
    visibilityPercentage: 1
- tapOn:
    text: 'Quick verify persisted config'
    retryTapIfNoChange: true
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- extendedWaitUntil:
    visible: '.*M:persisted:success.*'
    timeout: 120000
- scrollUntilVisible:
    element:
      text: 'Quick open store page'
    direction: DOWN
    timeout: 30000
    visibilityPercentage: 1
- tapOn: 'Quick open store page'
- extendedWaitUntil:
    notVisible: '@capgo/capacitor-updater'
    timeout: 120000
