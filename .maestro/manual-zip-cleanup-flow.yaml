appId: app.capgo.updater
---
- extendedWaitUntil:
    visible: '@capgo/capacitor-updater'
    timeout: 180000
- extendedWaitUntil:
    visible: '.*Harness: ready.*'
    timeout: 120000
- scrollUntilVisible:
    element:
      id: 'quick-action-advance-server-release'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn:
    id: 'quick-action-advance-server-release'
    waitToSettleTimeoutMs: 500
- extendedWaitUntil:
    visible: '.*(Marker: advance:success|M:advance:success).*'
    timeout: 30000
- scrollUntilVisible:
    element:
      id: 'quick-action-download-latest-bundle'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn:
    id: 'quick-action-download-latest-bundle'
    waitToSettleTimeoutMs: 500
- extendedWaitUntil:
    visible: '.*(Marker: download:success|M:download:success).*'
    timeout: 120000
- extendedWaitUntil:
    visible: '.*Download complete event: manual-zip-v4.*'
    timeout: 30000
- extendedWaitUntil:
    visible: '.*Update available event: manual-zip-v4.*'
    timeout: 30000
- scrollUntilVisible:
    element:
      id: 'quick-action-set-bundle-error'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn:
    id: 'quick-action-set-bundle-error'
    waitToSettleTimeoutMs: 500
- extendedWaitUntil:
    visible: '.*(Marker: bundle:success|M:bundle:success).*'
    timeout: 30000
- scrollUntilVisible:
    element:
      id: 'quick-action-delete-inactive-bundle'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn:
    id: 'quick-action-delete-inactive-bundle'
    waitToSettleTimeoutMs: 500
- extendedWaitUntil:
    visible: '.*(Marker: delete:success|M:delete:success).*'
    timeout: 30000
- scrollUntilVisible:
    element:
      id: 'quick-action-reset-to-builtin'
    direction: DOWN
    timeout: 30000
    centerElement: false
    visibilityPercentage: 1
- tapOn:
    id: 'quick-action-reset-to-builtin'
    waitToSettleTimeoutMs: 500
- extendedWaitUntil:
    visible: '@capgo/capacitor-updater'
    timeout: 180000
- scrollUntilVisible:
    element:
      text: '@capgo/capacitor-updater'
    direction: UP
    timeout: 120000
- assertVisible: '.*Current bundle source: builtin.*'
- assertVisible: '.*Build label: manual-zip-builtin.*'
