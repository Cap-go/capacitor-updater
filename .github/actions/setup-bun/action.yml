name: Setup Bun
description: Install cached Bun and optionally install Bun dependencies.
inputs:
  bun-version:
    description: Bun version to install.
    default: 1.3.12
  dependency-cache-key:
    description: Cache key for dependency directories.
    default: ''
  dependency-cache-path:
    description: Newline-separated dependency directories to cache.
    default: ''
  install-dependencies:
    description: Run bun install in the repository root.
    default: 'true'
  install-example:
    description: Run bun install in example-app.
    default: 'false'
runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
    - name: Cache Bun runtime
      uses: actions/cache@v5
      with:
        path: ~/.bun
        key: ${{ runner.os }}-bun-${{ inputs.bun-version }}
    - name: Install Bun
      shell: bash
      env:
        BUN_VERSION: ${{ inputs.bun-version }}
        GH_TOKEN: ${{ github.token }}
      run: ./scripts/ci/install-bun.sh
    - name: Cache Bun dependencies
      if: inputs.dependency-cache-key != '' && inputs.dependency-cache-path != ''
      uses: actions/cache@v5
      with:
        path: ${{ inputs.dependency-cache-path }}
        key: ${{ inputs.dependency-cache-key }}
        restore-keys: |
          ${{ runner.os }}-bun-deps-
    - name: Install root dependencies
      if: inputs.install-dependencies == 'true'
      shell: bash
      run: bun install
    - name: Install example app dependencies
      if: inputs.install-example == 'true'
      shell: bash
      working-directory: example-app
      run: bun install
