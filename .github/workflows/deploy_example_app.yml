name: Deploy example app to Capgo

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      channel:
        description: 'Capgo channel'
        required: false
        default: 'production'
permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event_name != 'release' || !github.event.release.prerelease }}
    name: Deploy example app to Capgo
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}
          fetch-depth: 1
          filter: blob:none
          persist-credentials: false

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.11
          no-cache: true

      - name: Install plugin dependencies
        run: bun install --frozen-lockfile

      - name: Build example app
        run: bun run example:build

      - name: Deploy to Capgo
        working-directory: example-app
        run: bunx @capgo/cli@8.12.1 bundle upload app.capgo.updater --path dist --channel "$CAPGO_CHANNEL" --package-json package.json,../package.json --node-modules node_modules,../node_modules --delta --no-key --ignore-checksum-check --version-exists-ok --apikey "$CAPGO_TOKEN"
        env:
          CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
          CAPGO_CHANNEL: ${{ github.event.inputs.channel || 'production' }}
