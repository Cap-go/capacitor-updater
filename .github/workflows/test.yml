name: Build source code and test it

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - renovate/**
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call: # Allow this workflow to be called by other workflows

jobs:
  guard_swiftpm_version:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - name: Enforce capacitor-swift-pm version
        run: |
          set -euo pipefail
          if ! grep -Eq 'https://github.com/ionic-team/capacitor-swift-pm\.git"[[:space:]]*,[[:space:]]*from:[[:space:]]*"8\.0\.0"' Package.swift; then
            echo "Expected capacitor-swift-pm to be pinned to 8.0.0 in Package.swift"
            exit 1
          fi
  build_android:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - name: Install Bun
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/ci/install-bun.sh
      - name: Install dependencies
        id: install_code
        run: bun i
      - name: Check plugin wiring
        run: bun run check:wiring
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Build
        id: build_code
        run: bun run verify:android
      - name: Run Android Tests
        id: test_android
        run: bun run test:android
  build_ios:
    timeout-minutes: 30
    runs-on: macOS-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - name: Install Bun
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/ci/install-bun.sh
      - name: Install dependencies
        id: install_code
        run: bun i
      - name: Check plugin wiring
        run: bun run check:wiring
      - name: Build
        id: build_code
        run: bun run verify:ios
      - name: Run iOS Tests
        id: test_ios
        run: bun run test:ios
  maestro_android_example_app:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    name: Android example app Maestro smoke
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - name: Install Bun
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/ci/install-bun.sh
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install root dependencies
        run: bun i
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Install Maestro
        env:
          GH_TOKEN: ${{ github.token }}
          MAESTRO_VERSION: cli-2.4.0
        run: ./scripts/ci/install-maestro.sh
      - name: Build plugin and example app
        run: |
          bun run build
          cd example-app
          bun install
          bun run build
          bunx cap sync android
      - name: Assemble Android example app
        run: cd example-app/android && ./gradlew assembleDebug
      - name: Run Maestro smoke tests
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          script: CAPGO_MAESTRO_SKIP_BUILD=1 CAPGO_MAESTRO_TIMEOUT_SECONDS=600 MAESTRO_DRIVER_STARTUP_TIMEOUT=300000 bun run test:maestro:android
      - name: Upload Maestro artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-results-android
          path: maestro-results
  maestro_ios_example_app:
    timeout-minutes: 30
    runs-on: macOS-latest
    name: iOS example app Maestro smoke
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - name: Install Bun
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/ci/install-bun.sh
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install root dependencies
        run: bun i
      - name: Install Maestro
        env:
          GH_TOKEN: ${{ github.token }}
          MAESTRO_VERSION: cli-2.4.0
        run: ./scripts/ci/install-maestro.sh
      - name: Run Maestro smoke tests
        run: bun run test:maestro:ios
      - name: Upload Maestro artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-results-ios
          path: maestro-results-ios
  web:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    name: 'Build code and test'
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - name: Install Bun
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/ci/install-bun.sh
      - name: Install dependencies
        id: install_code
        run: bun i
      - name: Check plugin wiring
        run: bun run check:wiring
      - name: Lint
        id: lint_code
        run: bun run lint
      - name: Build
        id: build_code
        run: bun run build
      - name: Verify
        id: verify_code
        run: bun run verify:web
  maestro_android_scenarios:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    name: maestro_android / ${{ matrix.scenario }}
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - deferred
          - always
          - at-install
          - on-launch
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - name: Install Bun
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/ci/install-bun.sh
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install dependencies
        run: bun i
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Install Maestro
        env:
          GH_TOKEN: ${{ github.token }}
          MAESTRO_VERSION: cli-2.4.0
        run: ./scripts/ci/install-maestro.sh
      - name: Run live update Maestro flow
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          script: ./scripts/maestro/run-android-live-update.sh "${{ matrix.scenario }}"
  maestro_android:
    if: always()
    needs:
      - maestro_android_scenarios
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Fail when any live update scenario fails
        run: |
          if [[ "${{ needs.maestro_android_scenarios.result }}" != "success" ]]; then
            echo "One or more Android live update Maestro scenarios failed."
            exit 1
          fi
