name: Build source code and test it

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - renovate/**
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call: # Allow this workflow to be called by other workflows

jobs:
  guard_swiftpm_version:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - name: Enforce capacitor-swift-pm version
        run: |
          set -euo pipefail
          if ! grep -Eq 'https://github.com/ionic-team/capacitor-swift-pm\.git"[[:space:]]*,[[:space:]]*from:[[:space:]]*"8\.0\.0"' Package.swift; then
            echo "Expected capacitor-swift-pm to be pinned to 8.0.0 in Package.swift"
            exit 1
          fi
  build_android:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Install dependencies
        id: install_code
        run: bun i
      - name: Check plugin wiring
        run: bun run check:wiring
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Build
        id: build_code
        run: bun run verify:android
      - name: Run Android Tests
        id: test_android
        run: bun run test:android
  build_ios:
    timeout-minutes: 30
    runs-on: macOS-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Install dependencies
        id: install_code
        run: bun i
      - name: Check plugin wiring
        run: bun run check:wiring
      - name: Build
        id: build_code
        run: bun run verify:ios
      - name: Run iOS Tests
        id: test_ios
        run: bun run test:ios
  web:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    name: 'Build code and test'
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Install dependencies
        id: install_code
        run: bun i
      - name: Check plugin wiring
        run: bun run check:wiring
      - name: Lint
        id: lint_code
        run: bun run lint
      - name: Build
        id: build_code
        run: bun run build
      - name: Verify
        id: verify_code
        run: bun run verify:web
  maestro_android:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install dependencies
        run: bun i
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Install Maestro
        env:
          MAESTRO_VERSION: cli-2.4.0
        run: |
          set -euo pipefail
          base_url="https://github.com/mobile-dev-inc/Maestro/releases/download/${MAESTRO_VERSION}"
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT
          curl -fsSL -o "$tmp_dir/maestro.zip" "${base_url}/maestro.zip"
          curl -fsSL -o "$tmp_dir/checksums_sha256.txt" "${base_url}/checksums_sha256.txt"
          (
            cd "$tmp_dir"
            grep ' maestro.zip$' checksums_sha256.txt | sha256sum -c -
          )
          unzip -q "$tmp_dir/maestro.zip" -d "$tmp_dir/maestro"
          install_path="$(find "$tmp_dir/maestro" -type f -name maestro | head -n 1)"
          if [[ -z "$install_path" ]]; then
            echo "Unable to locate Maestro binary after extracting ${MAESTRO_VERSION}" >&2
            exit 1
          fi
          install_root="$(dirname "$(dirname "$install_path")")"
          rm -rf "$HOME/.maestro"
          mkdir -p "$HOME/.maestro"
          cp -R "$install_root"/. "$HOME/.maestro/"
          if [[ ! -f "$HOME/.maestro/bin/maestro" || ! -d "$HOME/.maestro/lib" ]]; then
            echo "Incomplete Maestro installation for ${MAESTRO_VERSION}" >&2
            exit 1
          fi
          chmod 0755 "$HOME/.maestro/bin/maestro"
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Run live update Maestro flow
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: bun run test:maestro
