name: Bump version

on:
  push:
    branches:
      - main
      - development
    paths-ignore:
      - 'example-app/**'
  workflow_dispatch:

jobs:
  # Run all tests first before creating any tags
  test:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    uses: ./.github/workflows/test.yml

  # Only bump version and create tag if all tests pass
  bump-version:
    needs: [test]
    timeout-minutes: 30
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    name: "Bump version and create tag"
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: blob:none
          token: '${{ secrets.PERSONAL_ACCESS_TOKEN }}'
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        id: install_code
        run: bun i
      - name: Git config
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
      - name: Update Doc
        run: bun run docgen
      - name: Add doc to github
        run: |
          git add README.md
          git add api.md
          git commit --m "docs: update doc" || true
      - name: Bump version and tag (with patch fallback)
        run: |
          set -euo pipefail
          release_args=(--skip.changelog)

          if [[ "${GITHUB_REF}" == "refs/heads/development" ]]; then
            release_args+=(--prerelease alpha)
          fi

          if ! bunx capacitor-plugin-standard-version@latest "${release_args[@]}"; then
            echo "No conventional bump found; forcing patch release to ensure tag creation."
            bunx capacitor-plugin-standard-version@latest "${release_args[@]}" --release-as patch
          fi
      - name: Enforce plugin major matches Capacitor peer dependency
        run: |
          set -euo pipefail
          plugin_version=$(node -p "require('./package.json').version")
          plugin_major=${plugin_version%%.*}
          capacitor_major=$(node -p "require('./package.json').peerDependencies['@capacitor/core'].match(/\\d+/)[0]")

          if [[ "${plugin_major}" != "${capacitor_major}" ]]; then
            echo "Plugin major (${plugin_major}) must track Capacitor major (${capacitor_major})."
            exit 1
          fi
      - name: Push to origin
        run: |
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          remote_repo="https://${GITHUB_ACTOR}:${{ secrets.PERSONAL_ACCESS_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"
          git add -A
          git diff --staged --quiet || git commit -m "chore: commit any remaining changes" || true
          git pull --rebase $remote_repo $CURRENT_BRANCH
          git push $remote_repo HEAD:$CURRENT_BRANCH --follow-tags --tags
      - name: Push generated doc to doc repo
        if: github.ref == 'refs/heads/main'
        uses: nkoppel/push-files-to-another-repository@v1.1.4
        env:
          API_TOKEN_GITHUB: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          source-files: api.md
          destination-username: Cap-go
          destination-repository: website
          destination-directory: src/content/docs/docs/plugin
          destination-branch: main
          commit-email: martindonadieu@gmail.com
